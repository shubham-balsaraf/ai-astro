<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Krama{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="2.5" opacity="0.25"/>
                <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="1.5" opacity="0.12"/>
                <text x="50" y="68" text-anchor="middle" font-size="58" fill="currentColor" font-family="serif">ॐ</text>
            </svg>
            Krama
        </a>
        {% if session.get('username') %}
        <div class="nav-right">
            {% if session.get('birth_date') %}
            <a href="{{ url_for('compat_form') }}" class="nav-link">Compatibility</a>
            {% endif %}
            <span class="nav-user">{{ session['username'] }}</span>
            <a href="{{ url_for('logout') }}" class="nav-link">Leave</a>
        </div>
        {% endif %}
    </nav>

    <main class="{% block container_class %}container{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Powered by Vedic Wisdom & AI</p>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
